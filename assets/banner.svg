<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="200" fill="#030712"/>
  <rect width="900" height="200" fill="url(#grid)"/>

  <!-- CIRCUIT DECORATION -->
  <g stroke="#3b82f6" stroke-width="1" fill="none" opacity="0.3">
    <path d="M0 50 L150 50 L180 80 L300 80">
      <animate attributeName="stroke-dasharray" from="0,1000" to="1000,0" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M900 150 L750 150 L720 120 L600 120">
      <animate attributeName="stroke-dasharray" from="0,1000" to="1000,0" dur="3.5s" repeatCount="indefinite"/>
    </path>
    <circle cx="150" cy="50" r="3" fill="#3b82f6"/>
    <circle cx="750" cy="150" r="3" fill="#a855f7"/>
  </g>

  <!-- MAIN TITLE -->
  <g filter="url(#neonGlow)">
    <text x="450" y="100" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="54" font-weight="900" fill="url(#neonGradient)" text-anchor="middle" letter-spacing="8">
      COGNISYNC
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- TAGLINE -->
  <text x="450" y="145" font-family="'Courier New', monospace" font-size="14" fill="#94a3b8" text-anchor="middle" letter-spacing="4" opacity="0.8">
    [ SYNCHRONIZING DIALOGUE INTO INTELLIGENCE ]
  </text>

  <!-- STATUS BAR -->
  <rect x="350" y="165" width="200" height="2" fill="#1e293b"/>
  <rect x="350" y="165" width="80" height="2" fill="#3b82f6">
    <animate attributeName="x" values="350;470;350" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- BORDER -->
  <rect x="10" y="10" width="880" height="180" rx="10" fill="none" stroke="#1e293b" stroke-width="2"/>
  
  <!-- ANTIGRAVITY BADGE (Top Left) -->
  <g filter="url(#neonGlow)">
    <text x="30" y="38" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#3b82f6" opacity="0.8">
      ANTIGRAVITY
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite"/>
    </text>
  </g>

</svg>
